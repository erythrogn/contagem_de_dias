{% extends 'base.html' %}

{% block title %}Menu de Experiências · tamo junto{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/coisinhas/coisinhas.css') }}">
{% endblock %}

{% block content %}
<div id="coisinhas-content">
  <div class="wrap">
    
    <header class="menu-header">
      <p class="menu-eyebrow">Para Saborear Juntos</p>
      <h1 class="menu-title">Galeria de <span>Experiências</span></h1>
      <div class="gold-line center-line"></div>
    </header>

    <div class="menu-form-container glass-panel">
      <form id="coisinhaForm" class="elegant-form">
        <input type="text" id="coisinhaInput" placeholder="Adicionar nova experiência..." required autocomplete="off">
        <button type="submit" class="btn-add" aria-label="Adicionar">Servir</button>
      </form>
    </div>

    <div class="menu-filters">
      <button class="filter-btn active" data-filter="all">Menu Completo</button>
      <button class="filter-btn" data-filter="pending">Para Degustar</button>
      <button class="filter-btn" data-filter="done">Já Vividos</button>
    </div>

    <div class="coisinhas-grid" id="coisinhasList">
      </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
  <script type="module" src="{{ url_for('static', filename='js/coisinhas.js') }}"></script>
{% endblock %}
